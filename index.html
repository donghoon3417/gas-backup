<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
thead th {
  position: sticky;
  top: 0;
  background: white;
  z-index: 2;
}

body {
  font-size:18px;
  padding:5px;
  background:#f5f5f5;
}

/* 🔥 상단 메뉴 가운데 정렬 */
.top-menu {
  display:flex;
  justify-content:center;
  gap:5px;
}

/* 상단 버튼(운행일지기, 전체운행일지) */
.top-btn {
  width:auto;
  padding:8px 12px;
  margin:3px;
  font-size:20px;
  border:none;
  border-radius:6px;
  color:white;
  background:#ccc;
}

.top-btn.active {
  background:#ff6b9d;
}

.date-input{

  padding:8px;
  font-size:14px;
}

/* 일반 버튼 */
button {
  padding:10px;
  margin:3px;
  border:none;
  border-radius:6px;
  background:#ddd;
}

button.active {
  background:#4CAF50;
  color:white;
}

.section { margin-bottom:15px; }

/* 입력폼 */
input {
  width:100%;
  padding:12px 14px;   /* 🔥 위아래 크게 */
  font-size:16px;      /* 🔥 글자도 키움 */
  margin-bottom:10px;  /* 🔥 입력칸 간격 */
}

/* 저장 버튼 */
#saveBtn {
  width:100%;
  padding:14px;
  font-size:16px;
  margin-top:10px; /* 🔥 위 간격 */
}

/* 입력 영역 가운데 */
#formPage {
  max-width:600px;  /* 🔥 적당히 넓게 */
  margin:0 auto;
  padding:10px;
}

/* 🔥 전체 운행일지 가운데 */
#listPage {
  text-align:center;
}

/* 테이블 */
table {
  width:100%;              /* 🔥 화면 꽉 채움 */
  table-layout:fixed;      /* 🔥 열 너비 고정 */
  border-collapse:collapse;
  background:white;
}

/* 테이블 글자 가운데 */
td, th {
  padding:6px;
  border:1px solid #ccc;
  text-align:center;
  vertical-align:middle;

  overflow:hidden;
  text-overflow:ellipsis;

  white-space:normal;      /* 🔥 변경 */
  word-break:break-all;    /* 🔥 추가 */
}
th select {
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
}

@media (max-width: 768px){

  body {
    font-size:14px;
  }

  table {
    font-size:12px;
  }

  td, th {
    padding:4px;
  }

  button {
    font-size:12px;
    padding:6px;
  }

  input {
    font-size:14px;
  }

}
</style>
</head>

<body>
